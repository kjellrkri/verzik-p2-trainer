<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Verzik Phase 2 Trainer</title>
        <meta name="description" content="A page to help practice Verzik timing.">
        <meta name="viewport" content="width=device-width">

        <link rel="icon" href="favicon.ico" type="image/x-icon" />
        <link rel="stylesheet" href="css/normalize.css">
        <link rel="stylesheet" href="css/main.css?v=20260614-reset-default-settings">
    </head>
    <body onresize="resize()">
        <div class="canvas-wrapper">
            <div class="flex-container">
                <div>
                    <canvas id="tile-board" tabindex="1"></canvas>
                    <div id="tile-context-menu" class="tile-context-menu" role="menu">
                        <button type="button" id="add-tile-marker">Add tile marker</button>
                        <button type="button" id="label-tile-marker">Add text label</button>
                        <button type="button" id="custom-marker-color-action">Change marker color</button>
                        <button type="button" id="remove-tile-marker" class="danger">Remove tile marker</button>
                    </div>
                    <input type="color" id="tile-marker-color-picker" class="hidden-color-picker" value="#ffff00">
                    <div id="color-preset-menu" class="color-preset-menu" role="dialog" aria-label="Choose color">
                        <div id="color-preset-swatches" class="color-preset-swatches"></div>
                        <div class="color-preset-footer">
                            <button type="button" id="last-color-swatch" class="color-swatch last-color" title="Last used color">
                                <span>Last</span>
                            </button>
                            <button type="button" id="open-color-wheel">Color wheel...</button>
                        </div>
                    </div>
                </div>
                <div class="form-box">
                    <h3>Options:</h3>
                    <form>
                        <div class="form-line">
                            <span><label for="weapon-select">Select weapon</label>
                                <select id="weapon-select" onchange="updateWeaponSelect(this.id)">
                                    <option value="SCYTHE">scythe</option>
                                    <option value="WHIP">whip</option>
                                </select></span></div>
                        <br>
                        <div class="form-line">
                            <span><label for="tile-marker-type">Tile marker style</label>
                                <select id="tile-marker-type" onchange="updateValue(this.id)">
                                    <option value="none">none</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                </select></span>
                            <input type="color" id="color-tile-marker" onchange="updateValue(this.id)"></div>
                        <div class="form-line">
                            <span><label for="ground-marker-preset">Ground marker preset</label>
                                <select id="ground-marker-preset" onchange="updateGroundMarkerPreset()">
                                    <option value="none">none</option>
                                    <option value="hmt-boak">HMT BOAK tiles</option>
                                    <option value="reg-tob-boak">reg TOB BOAK tiles</option>
                                    <option value="custom" hidden>Custom / imported</option>
                                </select></span></div>
                        <div class="form-line marker-transfer-buttons">
                            <button type="button" id="import-ground-markers">Import JSON</button>
                            <button type="button" id="export-ground-markers">Export JSON</button>
                            <input type="file" id="ground-marker-file-input" accept=".json,application/json" hidden>
                        </div>
                        <div class="form-line">
                            <span><input type="checkbox" id="show-verzik-tiles" onchange="updateBoolean(this.id)">
                                <label for="show-verzik-tiles">Show Verzik tiles</label></span>
                            <input type="color" id="color-verzik-marker" onchange="updateValue(this.id)"></div>
                        <div class="form-line">
                            <span><input type="checkbox" id="show-melee-tiles" onchange="updateBoolean(this.id)">
                                <label for="show-melee-tiles">Show melee range tiles</label></span>
                            <input type="color" id="color-melee-marker" onchange="updateValue(this.id)"></div>
                        <br>
                        <div class="form-line">
                            <span><input type="checkbox" id="show-tile-indicators" onchange="updateBoolean(this.id)" checked >
                                <label for="show-tile-indicators">Show tile indicators</label></span>
                            <input type="color" id="color-tile-indicator" onchange="updateValue(this.id)"></div>
                        <div class="form-line">
                            <span><input type="checkbox" id="show-path-tiles" onchange="updateBoolean(this.id)" checked >
                                <label for="show-path-tiles">Show path tiles</label></span></div>
                        <div class="form-line">
                            <span><input type="checkbox" id="show-true-tile" onchange="updateTrueTile()">
                                <label for="show-true-tile">Show true tile</label></span>
                            <input type="color" id="color-true-tile" value="#ff0000" onchange="updateTrueTile()"></div>
                        <div class="form-line">
                            <span><input type="checkbox" id="show-xp-drops" onchange="updateBoolean(this.id)">
                                <label for="show-xp-drops">Show XP drops</label></span></div>
                        <br>
                        <div class="form-line">
                            <label for="ping-select">Set ping</label>
                            <span id="ping-display">50 ms</span>
                            <input type="range" id="ping-select" value="50" min="10" max="350" onchange="updatePing()"></div>
                        <div class="form-line">
                            <label for="volume-select">Volume</label>
                            <span id="volume-display">50%</span>
                            <input type="range" id="volume-select" value="50" min="0" max="100" onchange="updateVolume()"></div>
                        <div class="form-line">
                            <span><input type="checkbox" id="metronome-enabled" onchange="updateMetronome()">
                                <label for="metronome-enabled">Audible metronome</label></span></div>
                        <div class="form-line">
                            <span><input type="checkbox" id="visual-metronome-enabled" onchange="updateVisualMetronome()">
                                <label for="visual-metronome-enabled">Visual 4 tick metronome</label></span></div>
                        <div class="form-line">
                            <span><label for="visual-danger-tick">Danger tick</label>
                                <select id="visual-danger-tick" onchange="updateVisualDangerTick()">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                </select></span></div>
                        <div class="form-line">
                            <span><input type="checkbox" id="unlimited-hp-enabled" onchange="updateUnlimitedHp()">
                                <label for="unlimited-hp-enabled">Unlimited player and Verzik HP</label></span></div>
                        <div class="form-line">
                            <span><input type="checkbox" id="hmt-acid-pools-enabled" onchange="updateHmtAcidPools()">
                                <label for="hmt-acid-pools-enabled">HMT acid pools</label></span></div>
                        <div class="form-line reset-settings-row">
                            <button type="button" id="reset-default-settings">Reset to default settings</button>
                        </div>
                    </form>
                </div>
            </div>
            <p align="center">
                <button id="pause_btn" onclick="pause_play()">Pause</button>
                <button id="reset_btn" onclick="reset()">Reset Verzik</button>
            </p>
        </div>
        <div id="marker-json-panel" class="marker-json-panel" role="dialog" aria-modal="true"
             aria-labelledby="marker-json-title">
            <div class="marker-json-card">
                <h3 id="marker-json-title">Ground marker JSON</h3>
                <p id="marker-json-help"></p>
                <textarea id="marker-json-text" spellcheck="false"></textarea>
                <p id="marker-json-status" class="marker-json-status" aria-live="polite"></p>
                <div class="marker-json-actions">
                    <button type="button" id="choose-marker-json-file">Choose JSON file</button>
                    <button type="button" id="copy-marker-json">Copy JSON</button>
                    <button type="button" id="download-marker-json">Download JSON</button>
                    <button type="button" id="apply-marker-json">Load JSON</button>
                    <button type="button" id="close-marker-json">Close</button>
                </div>
            </div>
        </div>
        <div id="reset-settings-panel" class="marker-json-panel" role="dialog" aria-modal="true"
             aria-labelledby="reset-settings-title">
            <div class="marker-json-card reset-settings-card">
                <h3 id="reset-settings-title">Reset to default settings</h3>
                <p>Are you sure you want to restore to default settings</p>
                <div class="marker-json-actions">
                    <button type="button" id="confirm-reset-settings">Yes</button>
                    <button type="button" id="cancel-reset-settings">No</button>
                </div>
            </div>
        </div>
        <script type="text/javascript" src="js/trainer.js?v=20260614-crab-image"></script>
    </body>
</html>
