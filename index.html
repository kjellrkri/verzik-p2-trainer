<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Verzik Phase 2 Trainer</title>
        <meta name="description" content="A page to help practice Verzik timing.">
        <meta name="viewport" content="width=device-width">

        <link rel="icon" href="favicon.ico" type="image/x-icon" />
        <link rel="stylesheet" href="css/normalize.css">
        <link rel="stylesheet" href="css/main.css">
    </head>
    <body onresize="resize()">
        <div class="canvas-wrapper">
            <div class="flex-container">
                <div>
                    <canvas id="tile-board" tabindex="1"></canvas>
                    <div id="tile-context-menu" class="tile-context-menu" role="menu">
                        <button type="button" id="add-tile-marker">Add tile marker</button>
                        <button type="button" id="label-tile-marker">Add text label</button>
                        <button type="button" id="custom-marker-color-action">Change marker color</button>
                        <button type="button" id="remove-tile-marker" class="danger">Remove tile marker</button>
                    </div>
                    <input type="color" id="tile-marker-color-picker" class="hidden-color-picker" value="#ffff00">
                    <div id="color-preset-menu" class="color-preset-menu" role="dialog" aria-label="Choose color">
                        <div id="color-preset-swatches" class="color-preset-swatches"></div>
                        <div class="color-preset-footer">
                            <button type="button" id="last-color-swatch" class="color-swatch last-color" title="Last used color">
                                <span>Last</span>
                            </button>
                            <button type="button" id="open-color-wheel">Color wheel...</button>
                        </div>
                    </div>
                </div>
                <div class="form-box">
                    <h3>Options:</h3>
                    <form>
                        <input type="hidden" id="refreshed" value="0">
                        <div class="form-line">
                            <span><label for="weapon-select">Select weapon</label>
                                <select id="weapon-select" onchange="updateWeaponSelect(this.id)">
                                    <option value="SCYTHE">scythe</option>
                                    <option value="WHIP">whip</option>
                                </select></span></div>
                        <br>
                        <div class="form-line">
                            <span><label for="tile-marker-type">Tile marker style</label>
                                <select id="tile-marker-type" onchange="updateValue(this.id)">
                                    <option value="none">none</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                </select></span>
                            <input type="color" id="color-tile-marker" onchange="updateValue(this.id)"></div>
                        <div class="form-line">
                            <span><input type="checkbox" id="show-verzik-tiles" onchange="updateBoolean(this.id)">
                                <label for="show-verzik-tiles">Show Verzik tiles</label></span>
                            <input type="color" id="color-verzik-marker" onchange="updateValue(this.id)"></div>
                        <div class="form-line">
                            <span><input type="checkbox" id="show-melee-tiles" onchange="updateBoolean(this.id)">
                                <label for="show-melee-tiles">Show melee range tiles</label></span>
                            <input type="color" id="color-melee-marker" onchange="updateValue(this.id)"></div>
                        <br>
                        <div class="form-line">
                            <span><input type="checkbox" id="show-tile-indicators" onchange="updateBoolean(this.id)" checked >
                                <label for="show-tile-indicators">Show tile indicators</label></span>
                            <input type="color" id="color-tile-indicator" onchange="updateValue(this.id)"></div>
                        <div class="form-line">
                            <span><input type="checkbox" id="show-path-tiles" onchange="updateBoolean(this.id)" checked >
                                <label for="show-path-tiles">Show path tiles</label></span></div>
                        <div class="form-line">
                            <span><input type="checkbox" id="show-true-tile" onchange="updateTrueTile()">
                                <label for="show-true-tile">Show true tile</label></span>
                            <input type="color" id="color-true-tile" value="#ff0000" onchange="updateTrueTile()"></div>
                        <br>
                        <div class="form-line">
                            <label for="ping-select">Set ping</label>
                            <span id="ping-display">50 ms</span>
                            <input type="range" id="ping-select" value="50" min="10" max="350" onchange="updatePing()"></div>
                        <div class="form-line">
                            <label for="volume-select">Volume</label>
                            <span id="volume-display">50%</span>
                            <input type="range" id="volume-select" value="50" min="0" max="100" onchange="updateVolume()"></div>
                        <div class="form-line">
                            <span><input type="checkbox" id="metronome-enabled" onchange="updateMetronome()">
                                <label for="metronome-enabled">Game tick metronome</label></span></div>
                        <div class="form-line">
                            <span><input type="checkbox" id="unlimited-hp-enabled" onchange="updateUnlimitedHp()">
                                <label for="unlimited-hp-enabled">Unlimited player and Verzik HP</label></span></div>
                    </form>
                </div>
            </div>
            <p align="center">
                <button id="pause_btn" onclick="pause_play()">Pause</button>
                <button id="reset_btn" onclick="reset()">Reset Verzik</button>
            </p>
        </div>
        <script type="text/javascript" src="js/trainer.js?v=20260613-unlimited-default"></script>
    </body>
</html>
